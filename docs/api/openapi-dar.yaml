        '500':
          $ref: '#/components/responses/InternalServerError'
  /access-records:
    post:
      operationId: createAccessRecord
      summary: Create an Access Record
      description: "Registers a new access record on behalf of a Controller. Returns\
        \ `201` and\nan `access-token` containing the new access key (`ak`), plus\
        \ a `Location`\nheader pointing to the created resource.\n\nAll records use\
        \ the same `AccessRecord` schema. The `processing.legal-basis`\nvalue determines\
        \ which additional fields are expected:\n\n- **Consent bases** — populate\
        \ `notice` and `access-event.consent`.\n- **Legitimate interests** — populate\
        \ `lia-reference` on the lead controller\n  entry; set `notice` and `access-event.consent`\
        \ to null.\n- **Public task / legal obligation** — populate `statutory-reference`\
        \ on the\n  lead controller entry; set `notice` and `access-event.consent`\
        \ to null.\n- **Contract** — set `notice` and `access-event.consent` to null.\n\
        \nHistoric records may be submitted — `access-event.registered-at` may predate\n\
        `record-metadata.created-at`.\n\nIf the DCC has previously submitted a `DISCOVERED`\
        \ record for the same MPxN\nand organisation, the register will link the two\
        \ records on creation. The\nDISCOVERED record is retained for audit; the new\
        \ full record becomes `ACTIVE`.\n\nTo update an existing record use `PUT /access-records/{ak}`.\n\
        \n\n**Cross-DUID re-identification:** To create an Access Record linked to\
        \ an Identity Record originally created by another Data User, include a `reidentification-token`\
        \ field in the request body (alongside the standard `AccessRecord` fields,\
        \ without `record-metadata.identity-record-ref`). Obtain the token via `POST\
        \ /identity-records/reidentify`. The register validates the token and resolves\
        \ the `ir` internally."
      tags:
      - Data Users
      security:
      - bearerAuth: []
      requestBody:
        description: An AccessRecord. All legal bases use this same schema.
        required: true
        content:
