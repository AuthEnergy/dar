                        - name: "Grid Analytics Ltd"
                          role: joint
                          contact-url: "https://gridanalytics.com/contact"
                          privacy-rights-url: "https://gridanalytics.com/your-rights"
                          lia-reference: "LIA-2024-003"
                    identity-record-ref: "ir_a3c5e7f9b1d3a3c5e7f9b1d3"
