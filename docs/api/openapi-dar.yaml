                    legal-basis: "uk-consent"
                    purpose: "Energy efficiency analysis and tariff recommendations"
                    data-types:
                      - HH-CONSUMPTION
                      - HH-EXPORT
                  access-event:
                    state: ACTIVE
                    registered-at: "2023-11-07T05:31:56Z"
                    expiry: "2027-11-10T17:07:01.580Z"
                    controller-reference: "REF-00123"
