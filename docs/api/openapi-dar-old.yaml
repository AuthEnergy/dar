  /identity-records/{ir}/re-identify/{tokenRef}:
    get:
      operationId: pollReIdentifyStatus
      summary: Poll Magic-Link Re-identification Status
      description: |
        Polls the status of a magic-link re-identification flow. The `token-ref`
        is returned when `POST /identity-records/{ir}/re-identify` is called with
        `method: magic-link`.

        Poll this endpoint until `status` is `confirmed` (customer clicked the
        link) or `expired` (15-minute window elapsed without redemption).

        **Suggested polling interval:** every 3–5 seconds. Stop polling on
        `confirmed`, `expired`, or after 20 minutes.
      tags:
