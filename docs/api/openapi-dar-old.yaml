        - name: tokenRef
          in: path
          required: true
          description: The `token-ref` returned by the magic-link initiation call.
          schema:
            type: string
            pattern: "^mlr_[0-9a-f]{24}$"
            example: "mlr_9f8e7d6c5b4a9f8e7d6c5b4a"
