                      timestamp: "2026-03-24T09:05:00Z"
                      transaction-id: tid_aabbccddeeff001122334455
                    status: pending
                    confirmed-at: null
                confirmed:
                  summary: Customer redeemed the link
                  value:
                    response:
                      resource: /v1/identity-records/ir_a3c5e7f9b1d3a3c5e7f9b1d3/re-identify/mlr_9f8e7d6c5b4a9f8e7d6c5b4a
                      timestamp: "2026-03-24T09:07:30Z"
                      transaction-id: tid_112233445566778899aabbcc
                    status: confirmed
                    confirmed-at: "2026-03-24T09:07:28Z"
        "401":
          $ref: "#/components/responses/Unauthorised"
        "403":
